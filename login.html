<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve-net</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="login.css">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-page">
      <div class="login-box">

        <h1 id="form-title">Welcome Back</h1>
        <p id="form-subtitle">Login to continue</p>

        <div class="toggle-box">
          <button id="signin-tab" class="active-btn">Sign In</button>
          <button id="signup-tab" class="">Sign Up</button>
        </div>

        <form id="auth-form">
          <input type="text" id="name-input" placeholder="Enter full name" class="form-control hidden" />
          
          <input type="email" placeholder="Enter email" class="form-control" required />

          <input type="text" id="city-input" placeholder="Enter city" class="form-control hidden" />

          <input type="password" placeholder="Enter password" class="form-control" minlength="3" maxlength="6" required />

          <button type="submit" id="submit-btn" class="login-btn">Login</button>
        </form>

      </div>
    </div>

    <script>
        function polyfillclasss() {
            document.querySelectorAll('[class]').forEach(element => {
                const classValue = element.getAttribute('class');
                element.setAttribute('class', classValue);
            });
        }
        polyfillclasss(); 
        const signinTab = document.getElementById('signin-tab');
        const signupTab = document.getElementById('signup-tab');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const nameInput = document.getElementById('name-input');
        const cityInput = document.getElementById('city-input');
        const submitBtn = document.getElementById('submit-btn');

        function toggleView(isLogin) {
            if (isLogin) {
                formTitle.textContent = "Welcome Back";
                formSubtitle.textContent = "Login to continue";
                submitBtn.textContent = "Login";
                
                signinTab.setAttribute('class', 'active-btn');
                signupTab.setAttribute('class', '');
                
                nameInput.classList.add('hidden');
                cityInput.classList.add('hidden');
            } else {
                formTitle.textContent = "Create Account";
                formSubtitle.textContent = "Register to continue";
                submitBtn.textContent = "Register";
                
                signupTab.setAttribute('class', 'active-btn');
                signinTab.setAttribute('class', '');
                
                nameInput.classList.remove('hidden');
                cityInput.classList.remove('hidden');
            }
            polyfillclasss(); 
        }

        signinTab.addEventListener('click', (e) => { e.preventDefault(); toggleView(true); });
        signupTab.addEventListener('click', (e) => { e.preventDefault(); toggleView(false); });
        document.getElementById('auth-form').addEventListener('submit', (e) => e.preventDefault());
    </script>
    
</body>
</html>
