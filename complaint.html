<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve-net</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    
    <style>
        .complaints-page {
          min-height: 100vh;
          background: linear-gradient(
            to right,
            #020024,
            #090979,
            #000428
          );
          padding-top: 100px;
        }

        .complaint-form {
          width: 600px;
          margin: auto;
          background: rgba(255,255,255,0.08);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 20px;
          padding: 40px;
          color: white;
        }

        .complaint-form label {
          margin-bottom: 10px;
          display: block;
          font-weight: 500;
        }

        .form-control {
          background: rgba(255,255,255,0.08) !important;
          border: 1px solid rgba(255,255,255,0.1) !important;
          color: white !important;
        }

        /* Styling for dropdown option items in native browser */
        .form-control option {
          background: #090979;
          color: white;
        }

        .form-control:focus {
          background: rgba(255,255,255,0.1) !important;
          color: white !important;
          box-shadow: none !important;
          border-color: #6a5cff !important;
        }

        .complaint-btn {
          width: 100%;
          height: 50px;
          border: none;
          border-radius: 30px;
          background: linear-gradient(
            to right,
            #6a5cff,
            #d946ef
          );
          color: white;
          font-size: 18px;
          font-weight: bold;
          margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="complaints-page">

        <div class="container py-5">

          <h1 class="text-center text-light mb-5">
            Create Complaint
          </h1>

          <div class="complaint-form">

            <form id="complaint-submission-form">

              <div class="mb-4">
                <label>Complaint Title</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter complaint title" 
                  required
                />
              </div>

              <div class="mb-4">
                <label>Category</label>
                <select class="form-control" required>
                  <option value="" disabled selected hidden>Select Category</option>
                  <option>Roads</option>
                  <option>Water</option>
                  <option>Electricity</option>
                  <option>Garbage</option>
                </select>
              </div>

              <div class="mb-4">
                <label>Description</label>
                <textarea
                  rows="5"
                  class="form-control"
                  placeholder="Describe the issue"
                  required
                ></textarea>
              </div>

              <div class="mb-4">
                <label>Upload Image (Optional)</label>
                <input
                  type="file"
                  class="form-control"
                  accept="image/*"
                />
              </div>

              <button type="submit" class="complaint-btn">
                Submit Complaint
              </button>

            </form>

          </div>

        </div>

      </div>
</body>
</html>
