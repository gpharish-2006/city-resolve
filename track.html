<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .track-page {
          min-height: 100vh;
          background: linear-gradient(
            to right,
            #020024,
            #090979,
            #000428
          );
          display: flex;
          justify-content: center;
          align-items: center;
        }
        
        .track-box {
          width: 500px;
          background: rgba(255,255,255,0.08);
          backdrop-filter: blur(10px);
          border-radius: 20px;
          padding: 40px;
          color: white;
          text-align: center;
        }
        
        .track-btn {
          width: 100%;
          height: 50px;
          border: none;
          border-radius: 30px;
          background: linear-gradient(
            to right,
            #6a5cff,
            #d946ef
          );
          color: white;
          font-size: 18px;
          font-weight: bold;
        }
        
        .status-box {
          background: rgba(255,255,255,0.08);
          padding: 20px;
          border-radius: 15px;
        }

        .form-control {
          background: rgba(255,255,255,0.08);
          border: 1px solid rgba(255,255,255,0.1);
          color: white;
        }

        .form-control::placeholder {
          color: rgba(255,255,255,0.5);
        }

        .form-control:focus {
          background: rgba(255,255,255,0.1);
          color: white;
          box-shadow: none;
          border-color: #6a5cff;
        }

        .hidden {
          display: none !important;
        }
    </style>
</head>
<body>
    <div class="track-page">
        <div class="track-box">
          <h1 class="mb-4">Track Complaint</h1>
          <form id="track-form">
              <input
                type="text"
                id="complaint-id-input"
                class="form-control mb-4"
                placeholder="Enter Complaint ID"
                required
              />
              <button type="submit" class="track-btn">Check Status</button>
          </form>

          <div id="status-display" class="status-box mt-5 hidden">
            <h4 id="status-title">Status: In Progress</h4>
            <p id="status-text">Your complaint is currently being reviewed by the city department.</p>
          </div>
        </div>
      </div>

    
</body>
</html>
